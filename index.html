<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNTECK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@500;700&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0A0F1C;
    --bg-rgb:10,15,28;
    --surface:#111826;
    --surface-2:#182234;
    --border:#26324A;
    --text:#E7ECF3;
    --text-muted:#8390A6;
    --accent:#5B8DFF;
    --accent-rgb:91,141,255;
    --accent-soft:rgba(91,141,255,.12);
    --accent-2:#E0B04E;
    --accent-2-rgb:224,176,78;
    --accent-2-soft:rgba(224,176,78,.14);
    --danger:#E5605A;
    --radius:16px;
    --shadow:0 20px 50px -20px rgba(0,0,0,.6);
    --glow:0 0 0 1px rgba(var(--accent-rgb),.35), 0 12px 34px -12px rgba(var(--accent-rgb),.45);
    --font-display:'Sora',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  html[data-theme="light"]{
    --bg:#F4F6FA;
    --bg-rgb:244,246,250;
    --surface:#FFFFFF;
    --surface-2:#EEF1F7;
    --border:#DCE2EC;
    --text:#111726;
    --text-muted:#5A6478;
    --accent:#2E5BDB;
    --accent-rgb:46,91,219;
    --accent-soft:rgba(46,91,219,.08);
    --accent-2:#95721E;
    --accent-2-rgb:149,114,30;
    --accent-2-soft:rgba(149,114,30,.1);
    --shadow:0 20px 50px -25px rgba(20,30,50,.2);
    --glow:0 0 0 1px rgba(var(--accent-rgb),.25), 0 12px 30px -14px rgba(var(--accent-rgb),.3);
  }
  html[lang="ar"] body{ font-family:'Noto Sans Arabic','Inter',sans-serif; }
  html[lang="ja"] body{ font-family:'Noto Sans JP','Inter',sans-serif; }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;color:var(--text);
    background:
      radial-gradient(ellipse 900px 500px at 12% -8%, rgba(var(--accent-rgb),.16), transparent 60%),
      radial-gradient(ellipse 700px 500px at 92% 8%, rgba(var(--accent-2-rgb),.10), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    font-family:var(--font-body);
    transition:background .3s ease,color .3s ease;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--accent);color:#0A0F1C;}

  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}

  /* ---------- NAV ---------- */
  header.dock{
    position:sticky;top:0;z-index:100;
    background:color-mix(in srgb, var(--bg) 78%, transparent);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    box-shadow:0 1px 0 rgba(var(--accent-rgb),.15);
  }
  .dock-inner{
    max-width:1180px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    position:relative;
  }
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:.5px;}
  .brand-mark{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-weight:600;color:#0A0F1C;font-size:13px;
    box-shadow:0 6px 20px -6px rgba(var(--accent-rgb),.7);
  }
  nav.links{display:flex;gap:4px;align-items:center;}
  nav.links button{
    background:none;border:none;color:var(--text-muted);font-family:var(--font-mono);
    font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer;
    transition:all .2s ease;letter-spacing:.3px;
  }
  nav.links button:hover{color:var(--text);background:var(--surface-2);}
  nav.links button.active{
    color:var(--accent);background:var(--accent-soft);
    box-shadow:inset 0 0 0 1px rgba(var(--accent-rgb),.4);
  }
  .dock-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{
    width:38px;height:38px;border-radius:999px;border:1px solid var(--border);
    background:var(--surface);color:var(--text-muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:15px;
    transition:all .2s ease;
  }
  .icon-btn:hover{color:var(--accent);border-color:rgba(var(--accent-rgb),.6);box-shadow:0 0 0 4px var(--accent-soft);}
  .icon-btn:disabled{opacity:.35;cursor:default;box-shadow:none;color:var(--text-muted);border-color:var(--border);}
  html[dir="rtl"] #backIcon{display:inline-block;transform:scaleX(-1);}

  /* Hamburger (mobile nav toggle) */
  .hamburger-btn{display:none;flex-direction:column;gap:4px;padding:9px;}
  .hamburger-btn span{width:16px;height:2px;background:var(--text-muted);border-radius:2px;transition:all .25s ease;}
  .hamburger-btn:hover span{background:var(--accent);}
  .hamburger-btn.is-open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
  .hamburger-btn.is-open span:nth-child(2){opacity:0;}
  .hamburger-btn.is-open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}

  /* ---------- SECTIONS / AREAS ---------- */
  section.area{padding:96px 0;display:none;}
  section.area.is-active{display:block;}
  .eyebrow{
    font-family:var(--font-mono);font-size:12px;letter-spacing:2px;
    color:var(--accent);text-transform:uppercase;margin:0 0 12px;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow::before{
    content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px 2px rgba(var(--accent-rgb),.7);flex:none;
  }
  h2.section-title{
    font-family:var(--font-display);font-size:clamp(28px,4vw,40px);
    font-weight:700;margin:0 0 8px;
  }
  p.section-sub{color:var(--text-muted);font-size:16px;max-width:620px;margin:0 0 44px;line-height:1.6;}

  /* ---------- HERO / AREA1 ---------- */
  section.hero{
    padding-top:64px;
    background:
      linear-gradient(rgba(var(--bg-rgb),.88),rgba(var(--bg-rgb),.92)),
      url('https://picsum.photos/1600/900?grayscale') center/cover;
  }
  .hero-top{display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:center;}
  @media(max-width:860px){.hero-top{grid-template-columns:1fr;}}
  .hero-greeting{
    font-family:var(--font-mono);color:var(--accent);font-size:14px;letter-spacing:1px;margin-bottom:18px;
    display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;
    background:var(--accent-soft);box-shadow:inset 0 0 0 1px rgba(var(--accent-rgb),.3);
  }
  h1.hero-title{
    font-family:var(--font-display);font-size:clamp(34px,5.6vw,58px);
    font-weight:800;line-height:1.05;margin:0 0 20px;
  }
  h1.hero-title span{
    background:linear-gradient(100deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero-desc{color:var(--text-muted);font-size:17px;line-height:1.7;max-width:520px;margin:0 0 30px;}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;}
  .btn{
    font-family:var(--font-mono);font-size:13.5px;font-weight:500;padding:14px 26px;
    border-radius:12px;cursor:pointer;border:1px solid transparent;
    display:inline-flex;align-items:center;gap:8px;transition:all .25s ease;
  }
  .btn-primary{background:linear-gradient(120deg,var(--accent),color-mix(in srgb, var(--accent) 70%, var(--accent-2)));color:#0A0F1C;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 30px -10px rgba(var(--accent-rgb),.6);}
  .btn-ghost{background:transparent;border-color:var(--border);color:var(--text);}
  .btn-ghost:hover{border-color:rgba(var(--accent-rgb),.6);color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}

  .marquee-panel{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 0;box-shadow:var(--shadow), inset 0 0 0 1px rgba(var(--accent-rgb),.08);overflow:hidden;position:relative;
  }
  .marquee-panel::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--surface),transparent 8%,transparent 92%,var(--surface));z-index:2;pointer-events:none;}
  .marquee-track{display:flex;gap:10px;width:max-content;animation:scroll 22s linear infinite;padding:0 14px;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .tag-chip{
    font-family:var(--font-mono);font-size:12.5px;padding:8px 14px;border-radius:20px;
    background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);white-space:nowrap;
    transition:all .2s ease;
  }
  .tag-chip:hover{border-color:rgba(var(--accent-rgb),.6);color:var(--accent);}
  .marquee-label{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:0 18px 12px;letter-spacing:1px;}

  .hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:56px;}
  @media(max-width:760px){.hero-grid{grid-template-columns:1fr;}}
  .hero-block{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:22px;transition:all .25s ease;
  }
  .hero-block:hover{border-color:rgba(var(--accent-rgb),.35);transform:translateY(-3px);box-shadow:var(--shadow);}
  .hero-block h3{font-family:var(--font-display);font-size:15px;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .hero-block h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px 2px rgba(var(--accent-rgb),.6);}
  .mini-item{
    display:flex;justify-content:space-between;align-items:center;padding:9px 0;
    border-bottom:1px solid var(--border);font-size:13.5px;
  }
  .mini-item:last-child{border-bottom:none;}
  .mini-item span.tag{font-family:var(--font-mono);font-size:11px;color:var(--accent);}

  /* ---------- ABOUT / AREA2 ---------- */
  .about-grid{display:grid;grid-template-columns:220px 1fr;gap:48px;align-items:start;}
  @media(max-width:760px){.about-grid{grid-template-columns:1fr;}}
  .avatar{
    width:100%;aspect-ratio:1/1;border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:56px;font-weight:800;color:var(--accent);
    box-shadow:0 20px 50px -25px rgba(var(--accent-rgb),.5);
    border:2px solid transparent;
    background:
      linear-gradient(155deg,var(--surface-2),var(--surface)) padding-box,
      linear-gradient(135deg,var(--accent),var(--accent-2)) border-box;
  }
  .about-name{font-family:var(--font-display);font-size:26px;font-weight:700;margin:0 0 6px;}
  .about-role{color:var(--text-muted);font-family:var(--font-mono);font-size:13px;margin:0 0 22px;}
  .about-text{color:var(--text-muted);font-size:16px;line-height:1.8;max-width:620px;margin:0 0 28px;}
  .contact-row{display:flex;gap:12px;flex-wrap:wrap;}
  .contact-card{
    display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:12px;
    border:1px solid var(--border);background:var(--surface);font-size:14px;font-weight:500;
    transition:all .25s ease;
  }
  .contact-card:hover{border-color:rgba(var(--accent-rgb),.6);color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 26px -14px rgba(var(--accent-rgb),.5);}

  /* ---------- PROJECTS / AREA3 ---------- */
  .project-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  @media(max-width:900px){.project-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:640px){.project-grid{grid-template-columns:1fr;}}
  .project-card{
    background:var(--surface);border:1.5px solid rgba(var(--accent-rgb),.3);border-radius:var(--radius);
    padding:26px;display:flex;flex-direction:column;gap:16px;cursor:pointer;
    transition:all .3s ease;position:relative;overflow:hidden;
  }
  .project-card:hover{
    border-color:var(--accent);transform:translateY(-8px) scale(1.03);
    box-shadow:var(--shadow), 0 0 0 1px rgba(var(--accent-rgb),.35);
  }
  .project-thumb{
    height:120px;border-radius:10px;background:linear-gradient(135deg,var(--surface-2),var(--bg));
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
    font-size:28px;font-weight:800;color:var(--border);border:1px solid var(--border);
    transition:all .3s ease;
  }
  .project-card:hover .project-thumb{
    color:var(--accent);border-color:rgba(var(--accent-rgb),.4);
    background:linear-gradient(135deg,var(--accent-soft),var(--surface-2));
  }
  .project-name{font-family:var(--font-display);font-size:18px;font-weight:700;}
  .project-desc{font-size:13.5px;color:var(--text-muted);line-height:1.6;flex:1;}
  .project-footer{display:flex;justify-content:space-between;align-items:center;}
  .project-open{font-family:var(--font-mono);font-size:12px;color:var(--accent);}

  /* ---------- SKILLS / AREA4 ---------- */
  .skills-block{margin-bottom:52px;}
  .skills-block h3{font-family:var(--font-display);font-size:17px;margin:0 0 18px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    font-family:var(--font-mono);font-size:12.5px;padding:9px 16px;border-radius:999px;
    background:var(--surface);border:1.5px solid rgba(var(--accent-rgb),.3);color:var(--text);
    transition:all .25s ease;display:inline-block;
  }
  .chip:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-3px) scale(1.05);box-shadow:0 8px 18px -10px rgba(var(--accent-rgb),.5);}
  .chip.wip{border-style:dashed;color:var(--accent-2);border-color:var(--accent-2);}
  .spec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:860px){.spec-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.spec-grid{grid-template-columns:1fr;}}
  .spec-card{
    background:var(--surface);border:1.5px solid rgba(var(--accent-rgb),.25);border-radius:12px;
    padding:16px 18px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;
    transition:all .25s ease;
  }
  .spec-card:hover{border-color:var(--accent);transform:translateY(-3px) scale(1.02);box-shadow:var(--shadow);}
  .spec-card .num{font-family:var(--font-mono);color:var(--accent);font-size:12px;}

  /* ---------- SETTINGS / AREA5 ---------- */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  @media(max-width:860px){.settings-grid{grid-template-columns:1fr;}}
  .panel{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:26px;position:relative;overflow:hidden;
  }
  .panel::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
  }
  .panel h3{font-family:var(--font-display);font-size:16px;margin:0 0 18px;}
  .field-label{font-family:var(--font-mono);font-size:11.5px;color:var(--text-muted);letter-spacing:1px;margin-bottom:8px;display:block;text-transform:uppercase;}
  .text-input{
    width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface-2);color:var(--text);font-family:var(--font-body);font-size:14px;margin-bottom:14px;
    transition:all .2s ease;
  }
  .text-input:focus{outline:none;border-color:rgba(var(--accent-rgb),.7);box-shadow:0 0 0 4px var(--accent-soft);}
  .row-gap{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
  .toggle-group{display:flex;gap:8px;flex-wrap:wrap;}
  .toggle-opt{
    font-family:var(--font-mono);font-size:12.5px;padding:9px 14px;border-radius:8px;
    border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);cursor:pointer;
    transition:all .2s ease;
  }
  .toggle-opt:hover{color:var(--text);}
  .toggle-opt.active{border-color:rgba(var(--accent-rgb),.6);color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 3px var(--accent-soft);}
  .logged-badge{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--accent-soft);border:1px solid rgba(var(--accent-rgb),.5);border-radius:10px;
    padding:11px 14px;font-size:13.5px;margin-bottom:14px;
  }
  .logged-badge button{
    background:transparent;border:1px solid rgba(var(--accent-rgb),.5);color:var(--accent);
    font-family:var(--font-mono);font-size:11.5px;padding:6px 12px;border-radius:8px;
    cursor:pointer;transition:all .2s ease;
  }
  .logged-badge button:hover{background:var(--accent);color:#0A0F1C;}

  .auth-warning{
    background:var(--accent-2-soft);border:1px solid rgba(var(--accent-2-rgb),.5);color:var(--accent-2);
    border-radius:10px;padding:11px 14px;font-size:12.5px;line-height:1.6;margin-bottom:16px;
  }
  .auth-error{
    background:rgba(229,96,90,.12);border:1px solid rgba(229,96,90,.5);color:var(--danger);
    border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;
  }
  .auth-btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  .feed-note{font-size:11.5px;color:var(--text-muted);margin:-8px 0 14px;line-height:1.5;}
  .feed-box{
    background:var(--bg);border:1px solid var(--border);border-radius:10px;
    max-height:230px;overflow-y:auto;padding:12px;margin-bottom:14px;font-family:var(--font-mono);
  }
  html[data-theme="light"] .feed-box{background:var(--surface-2);}
  .feed-msg{padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;line-height:1.5;}
  .feed-msg:last-child{border-bottom:none;}
  .feed-msg .who{color:var(--accent);font-weight:600;}
  .feed-msg .when{color:var(--text-muted);font-size:10.5px;display:block;margin-top:2px;}
  .feed-empty{color:var(--text-muted);font-size:12.5px;text-align:center;padding:18px 0;}
  .compose-row{display:flex;gap:8px;}
  .compose-row input{flex:1;margin-bottom:0;}

  /* ---------- VIDEOS ---------- */
  .videos-block{margin-top:44px;}
  .videos-block h3{font-family:var(--font-display);font-size:17px;margin:0 0 18px;}
  .video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;}
  @media(max-width:760px){.video-grid{grid-template-columns:1fr;}}
  .video-card{
    background:var(--surface);border:1.5px solid rgba(var(--accent-rgb),.25);border-radius:var(--radius);
    padding:16px;display:flex;flex-direction:column;gap:12px;transition:all .25s ease;
  }
  .video-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:var(--shadow);}
  .video-frame-wrap{
    position:relative;padding-top:56.25%;border-radius:10px;overflow:hidden;background:#000;
  }
  .video-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .video-meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
  .video-title{font-weight:600;}
  .new-badge{
    font-family:var(--font-mono);font-size:10px;padding:4px 9px;border-radius:20px;
    background:var(--accent-soft);color:var(--accent);white-space:nowrap;
  }

  footer{
    padding:44px 0 36px;text-align:center;border-top:1px solid var(--border);
    margin-top:0;
  }
  .socials{display:flex;justify-content:center;gap:20px;font-size:22px;margin-bottom:16px;flex-wrap:wrap;}
  .socials a{
    color:var(--text-muted);transition:all .25s ease;
    width:44px;height:44px;border-radius:999px;border:1.5px solid var(--border);
    display:flex;align-items:center;justify-content:center;
  }
  .socials a:hover{color:var(--accent);border-color:var(--accent);transform:translateY(-4px) scale(1.08);box-shadow:0 10px 24px -12px rgba(var(--accent-rgb),.6);}
  .footer-line{color:var(--text-muted);font-family:var(--font-mono);font-size:12px;}

  @media(prefers-reduced-motion:reduce){.marquee-track{animation:none;}html{scroll-behavior:auto;}}

  /* ================= MOBILE ================= */

/* ---------------- DATA ---------------- */
/*
  HOW TO ADD A NEW PROJECT OR VIDEO:
  - Just add a new object to PROJECTS or VIDEOS below with a "date" field in
    'YYYY-MM-DD' format (the day you publish/edit it).
  - Anything dated within the last 10 days automatically shows up in the
    "Latest releases" panel on area1 (the homepage). After 10 days it quietly
    drops out of area1 on its own — no need to remove it by hand.
  - It still always stays visible in its normal section (Projects / Videos).
*/
const PROJECTS = [
  { id:'unl', name:'Unl Studio', mark:'US', url:'https://brahimkha959-spec.github.io/Unl-studio-/', tags:['UNL','IDE'], date:'2026-05-01' },
  { id:'stories', name:'UNTECK Stories', mark:'ST', url:'https://brahimkha959-spec.github.io/unteck_stories/', tags:['Web','Stories'], date:'2026-04-10' },
  { id:'cosmos', name:'UNTECK COSMOS', mark:'CS', url:'https://brahimkha959-spec.github.io/UNTECK-COSMOS/', tags:['Web','App'], date:'2026-03-01' },
];
const VIDEOS = [
  { id:'video1', title:'UNTECK — video', ytId:'-VN1i4dwlNk', date:'2026-07-16' },
];
const LANGS = ['HTML','CSS','JS','SCSS','XML','Kotlin','Python','Java','Lua','PHP','MySQL','SQLite','GDScript','TypeScript'];
const LANG_WIP = 'UNL';
const SPECIALTIES_KEYS = ['spec_frontend','spec_backend','spec_apk','spec_ai','spec_cyber','spec_data','spec_systems','spec_iot','spec_networks','spec_games'];
const TOOLS_PREVIEW = ['HTML','CSS','JS','Kotlin','Python','UNL'];
const FRESH_WINDOW_DAYS = 10;

function daysAgo(dateStr){
  return (Date.now() - new Date(dateStr + 'T00:00:00').getTime()) / (1000*60*60*24);
}
function isFresh(dateStr){
  const d = daysAgo(dateStr);
  return d >= 0 && d <= FRESH_WINDOW_DAYS;
}
function latestWorks(){
  const works = [
    ...PROJECTS.map(p => ({ kind:'project', name:p.name, date:p.date, ref:p })),
    ...VIDEOS.map(v => ({ kind:'video', name:v.title, date:v.date, ref:v })),
  ];
  let fresh = works.filter(w => isFresh(w.date)).sort((a,b)=> new Date(b.date)-new Date(a.date));
  if(fresh.length === 0){
    fresh = [...works].sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,3);
  }
  return fresh;
}

/* ---------------- NAV / AREA SWITCHING ---------------- */
const sections = ['area1','area2','area3','area4','area5','area6'];
const navButtons = {};
document.querySelectorAll('#navLinks button').forEach(b=> navButtons[b.dataset.nav] = b);

const navLinksEl = document.getElementById('navLinks');
const hamburgerBtn = document.getElementById('hamburgerBtn');
const backBtn = document.getElementById('backBtn');

// The History/URL API can be blocked (throws SecurityError) when this page
// runs inside a sandboxed preview iframe (e.g. srcdoc). Everything below is
// wrapped so navigation still works perfectly even when that happens —
// it just won't be reflected in the browser's address bar in that case.
let historyApiOk = true;
function safePushState(state, id){
  if(!historyApiOk) return;
  try{ history.pushState(state, '', '#' + id); }
  catch(e){ historyApiOk = false; }
}
function safeReplaceState(state, id){
  if(!historyApiOk) return;
  try{ history.replaceState(state, '', '#' + id); }
  catch(e){ historyApiOk = false; }
}
function safeReadHash(){
  try{ return location.hash.replace('#',''); }
  catch(e){ return ''; }
}

let navStack = []; // our own in-memory back-stack, independent of the browser
let currentArea = 'area1';

function closeMobileNav(){
  navLinksEl.classList.remove('is-open');
  hamburgerBtn.classList.remove('is-open');
}

function updateBackButton(){
  backBtn.disabled = navStack.length === 0;
}

function showArea(id, opts={}){
  const { recordHistory = true, fromPopstate = false } = opts;
  if(!sections.includes(id)) id = 'area1';

  if(recordHistory && id !== currentArea){
    navStack.push(currentArea);
    safePushState({ area: id }, id);
  }
  currentArea = id;
  updateBackButton();

  sections.forEach(s => document.getElementById(s).classList.remove('is-active'));
  document.getElementById(id).classList.add('is-active');

  Object.values(navButtons).forEach(b=>b.classList.remove('active'));
  navButtons[id]?.classList.add('active');

  window.scrollTo({ top: 0, behavior: 'smooth' });
  closeMobileNav();
}

document.getElementById('navLinks').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-nav]');
  if(btn) showArea(btn.dataset.nav);
});

hamburgerBtn.addEventListener('click', ()=>{
  navLinksEl.classList.toggle('is-open');
  hamburgerBtn.classList.toggle('is-open');
});

backBtn.addEventListener('click', ()=>{
  if(navStack.length === 0) return;
  const prev = navStack.pop();
  if(historyApiOk){
    try{ history.back(); }catch(e){ historyApiOk = false; }
  }
  showArea(prev, { recordHistory:false });
});

window.addEventListener('popstate', (e)=>{
  const id = (e.state && e.state.area) || 'area1';
  if(navStack.length && navStack[navStack.length-1] === id) navStack.pop();
  showArea(id, { recordHistory:false, fromPopstate:true });
});

// Restore area from URL hash on load (e.g. refresh / shared link), otherwise start at area1
const startHash = safeReadHash();
const startArea = sections.includes(startHash) ? startHash : 'area1';
currentArea = startArea;
safeReplaceState({ area: startArea }, startArea);
showArea(startArea, { recordHistory:false });
updateBackButton();

async function handleSignup(){

/* ---------------- COMMUNITY FEED (Firestore, live, 24h auto-expiry) ---------------- */
let feedMessages = [];
const MESSAGE_TTL_MS = 24 * 60 * 60 * 1000; // messages auto-delete after 24 hours

function subscribeFeed(){
  if(!db) return;
  db.collection('messages').orderBy('ts','desc').limit(100)
    .onSnapshot(snapshot => {
      feedMessages = snapshot.docs.map(doc => {
        const data = doc.data();
        const ts = data.ts && data.ts.toMillis ? data.ts.toMillis() : Date.now();
        return { id: doc.id, name: data.name, text: data.text, ts };
      });
      // clean up anything older than 24h so the shared collection doesn't grow forever
      const now = Date.now();
      feedMessages
        .filter(m => (now - m.ts) > MESSAGE_TTL_MS)
        .forEach(m => db.collection('messages').doc(m.id).delete().catch(()=>{}));
      renderFeedUI();
    }, err => console.error('feed listener error', err));
}

function renderFeedUI(){
  const dict = T[state.lang];
  const box = document.getElementById('feedBox');
  const visible = feedMessages.filter(m => (Date.now() - m.ts) <= MESSAGE_TTL_MS);
  if(!firebaseReady){
    box.innerHTML = `<div class="feed-empty">${dict.auth_config_warning}</div>`;
  } else if(visible.length === 0){
    box.innerHTML = `<div class="feed-empty">${dict.feed_empty}</div>`;
  } else {
    box.innerHTML = visible.map(m => `
      <div class="feed-msg">
        <span class="who">${escapeHtml(m.name)}</span> — ${escapeHtml(m.text)}
        <span class="when">${new Date(m.ts).toLocaleString()}</span>
      </div>
    `).join('');
  }
  const composeInput = document.getElementById('composeInput');
  const sendBtn = document.getElementById('sendBtn');
  if(state.user && firebaseReady){
    composeInput.disabled = false;
    sendBtn.disabled = false;
    composeInput.placeholder = dict.community_compose_placeholder;
  } else {
    composeInput.disabled = true;
    sendBtn.disabled = true;
    composeInput.placeholder = dict.settings_feed_placeholder;
  }
}

document.getElementById('sendBtn').addEventListener('click', async ()=>{
  if(!state.user || !db) return;
  const input = document.getElementById('composeInput');
  const text = input.value.trim();
  if(!text) return;
  try{
    await db.collection('messages').add({
      name: state.user.displayName || state.user.email,
      text,
      ts: firebase.firestore.FieldValue.serverTimestamp(),
    });
    input.value = '';
  }catch(e){
    console.error('send message failed', e);
  }
});
document.getElementById('composeInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') document.getElementById('sendBtn').click();
});

function init(){
  applyTheme();
  applyI18n();
  renderAccountUI();
  renderFeedUI();
  subscribeFeed();

  // keep the "24h ago" cutoff accurate even with no new messages arriving
  setInterval(renderFeedUI, 60000);
}
